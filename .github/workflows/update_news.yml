name: Update Tech News Dashboard

on:
  schedule:
    - cron: '0 22,3,9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write      # Pagesへの書き込み権限
  id-token: write   # デプロイ認証用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run news aggregator
      run: python tech_news_aggregator.py
      env:
        GITHUB_ACTIONS: "true"

    # ファイル名を index.html にリネームして公開準備
    - name: Rename for Pages
      run: mv tech_news.html index.html

    # アーティファクト（公開用データ）のアップロード
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # ルールディレクトリ全体をアップロード

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
