name: Update Tech News Dashboard

on:
  schedule:
    # 毎日 日本時間 07:00, 12:00, 18:00 に実行 (UTCでは 22:00, 03:00, 09:00)
    - cron: '0 22,3,9 * * *'
  workflow_dispatch: # 手動実行も可能にする

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # リポジトリへの書き込み権限を付与
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run news aggregator
      run: python tech_news_aggregator.py
      env:
        GITHUB_ACTIONS: "true" # ブラウザを開かないように環境変数を渡す

    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add tech_news.html
        git commit -m "Update news dashboard [skip ci]" || echo "No changes to commit"
        git push
